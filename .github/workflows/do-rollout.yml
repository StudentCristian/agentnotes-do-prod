name: DO Rollout

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: do-rollout-production
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Rollout
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate BAML client
        run: pnpm exec baml-cli generate --from baml_src

      - name: Build app
        run: pnpm build

      - name: Validate App Platform spec
        run: doctl apps spec validate .do/app.yaml

  deploy:
    name: Deploy to App Platform
    needs: validate
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Deploy app update
        env:
          DO_APP_ID: ${{ secrets.DO_APP_ID }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          EDGE_STORE_ACCESS_KEY: ${{ secrets.EDGE_STORE_ACCESS_KEY }}
          EDGE_STORE_SECRET_KEY: ${{ secrets.EDGE_STORE_SECRET_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          DO_SPACES_KEY: ${{ secrets.DO_SPACES_KEY }}
          DO_SPACES_SECRET: ${{ secrets.DO_SPACES_SECRET }}
          DO_SPACES_BUCKET: agentnotes-audio-prod
          DO_SPACES_REGION: nyc3
          DO_SPACES_ENDPOINT: https://nyc3.digitaloceanspaces.com
        run: |
          chmod +x scripts/do-app-platform.sh
          ./scripts/do-app-platform.sh --app-id "$DO_APP_ID" --update-only