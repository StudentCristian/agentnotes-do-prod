services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    command: sleep infinity
    working_dir: /workspace
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      PNPM_STORE_DIR: /pnpm-store
    volumes:
      - .:/workspace:cached
      - pnpm-store:/pnpm-store

volumes:
  pnpm-store: